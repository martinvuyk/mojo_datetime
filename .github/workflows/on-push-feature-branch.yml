name: Run on a push into a feature branch

on:
  push:
    branches-ignore: [main, 0.26.2]

permissions:
  contents: read

concurrency: # Only allow a single run at a time
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    needs: lint
    uses: ./.github/workflows/test.yml
