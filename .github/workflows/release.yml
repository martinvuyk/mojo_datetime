name: Release tag pipeline

on:
  workflow_call:

permissions:
  contents: write

jobs:
  release-github:
    name: Upload to release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@main
        with:
          pixi-version: latest
          cache: true

      - name: Get the version
        id: get_version
        run: echo 'VERSION="${$(pixi project version get)}-${$(pixi list | grep "mojo-compiler" | awk '{print $2}')}"' >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v8
        with:
          name: mojo_datetime-package

      - name: Upload package to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: mojo_datetime.mojopkg
          tag: ${{ steps.get_version.outputs.VERSION }}
          overwrite: true
