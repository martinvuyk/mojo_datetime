name: Upgrade nightly version
on:
  schedule:
    - cron: 5 0 * * *  # At 12:05 AM
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pixi-upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Run upgrade
        run: pixi run upgrade

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update lockfile to latest Mojo version"
          branch: main